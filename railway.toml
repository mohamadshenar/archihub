[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/archi-hub run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
